<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Overthinking Breaker — Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="logo">
        <span class="icon">🧠</span>
        <h1>Overthinking Breaker</h1>
        <p>Stop hesitating. Start doing.</p>
      </div>

      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter username" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter password" />
        </div>
        <button type="submit" class="btn btn-primary">⚡ Launch Dashboard</button>
        <p class="error-msg" id="errorMsg">Invalid credentials. Try again.</p>
      </form>

      <div class="divider"></div>
      <p style="font-size:12px;color:var(--muted);text-align:center;">
        Demo: <strong style="color:var(--text)">student</strong> / <strong style="color:var(--text)">focus123</strong>
      </p>
    </div>
  </div>

  <script>
    const CREDENTIALS = { username: 'student', password: 'focus123' };

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      const err = document.getElementById('errorMsg');

      if (u === CREDENTIALS.username && p === CREDENTIALS.password) {
        localStorage.setItem('otb_user', u);
        window.location.href = 'dashboard.html';
      } else {
        err.style.display = 'block';
        document.getElementById('password').value = '';
      }
    });

    // Redirect if already logged in
    if (localStorage.getItem('otb_user')) {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
